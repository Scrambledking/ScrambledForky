# --- Lost limb / Stump wounds ---

- type: entity
  parent: WoundBase
  id: WoundStumpEdge
  name: ripped stump
  description: A bloody stump where a limb was torn off.
  components:
  - type: Wound
    maximumDamage: 80
    group: Stump
    isSurgical: true
    healPerTick: 0
  - type: WoundDescription
    descriptions:
      0.0: wound-stump-edge
  - type: WoundEffects
    effects:
    - id: BleedingLarge
    - id: Tendable
    - id: HealableNone
    - id: PainHellish
    - id: GermTracking
