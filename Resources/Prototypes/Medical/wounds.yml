# Baystation start
# Entity-based wound prototypes for the Baystation medical system.
# Each wound is a full entity with a WoundEffects component
# that references YAML-defined effect prototypes.

# --- Base wound entity ---

- type: entity
  id: WoundBase
  abstract: true
  description: A wound.
  components:
  - type: Wound
    maximumDamage: 100
  - type: WoundEffects
  - type: WoundDescription
    descriptions:
      0.0: wound-tiny
      10.0: wound-small
      20.0: wound-moderate
      40.0: wound-large
      60.0: wound-severe

# --- Brute / Bruise wounds ---

- type: entity
  parent: WoundBase
  id: WoundBruteTiny
  name: tiny bruise
  description: A barely visible bruise.
  components:
