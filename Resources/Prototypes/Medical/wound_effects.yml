# Baystation start
# Wound effect prototypes for the entity-based wound system.
# Each effect defines a behavior type and its default config values.
# Wound entities reference these by ID in their WoundEffects component.

# --- Bleeding effects (baseBleedAmount, bleedTimer: ticks until natural stop) ---

- type: woundEffect
  id: BleedingTiny
  effectType: Bleeding
  config:
    baseBleedAmount: 0.5
    bleedTimer: 30

- type: woundEffect
  id: BleedingSmall
  effectType: Bleeding
  config:
    baseBleedAmount: 1.0
    bleedTimer: 45

- type: woundEffect
  id: BleedingLight
  effectType: Bleeding
  config:
    baseBleedAmount: 1.5
    bleedTimer: 60

- type: woundEffect
  id: BleedingModerate
  effectType: Bleeding
  config:
    baseBleedAmount: 2.0
    bleedTimer: 75

- type: woundEffect
  id: BleedingFair
  effectType: Bleeding
  config:
    baseBleedAmount: 2.5
    bleedTimer: 90

- type: woundEffect
  id: BleedingLarge
  effectType: Bleeding
  config:
    baseBleedAmount: 3.0
    bleedTimer: 105

- type: woundEffect
  id: BleedingHeavy
  effectType: Bleeding
  config:
    baseBleedAmount: 4.0
    bleedTimer: 120

- type: woundEffect
  id: BleedingSevere
  effectType: Bleeding
  config:
    baseBleedAmount: 5.0
    bleedTimer: 150

- type: woundEffect
  id: BleedingCritical
  effectType: Bleeding
  config:
    baseBleedAmount: 6.0
    bleedTimer: 180

- type: woundEffect
  id: BleedingMassive
  effectType: Bleeding
  config:
    baseBleedAmount: 8.0
    bleedTimer: 240

