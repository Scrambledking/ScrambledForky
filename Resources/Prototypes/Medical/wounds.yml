    maximumDamage: 5
    group: Brute
  - type: WoundDescription
    descriptions:
      0.0: wound-brute-tiny
  - type: WoundEffects
    effects:
    - id: PainMinute
    - id: HealableVeryFast
    - id: GermTracking

- type: entity
